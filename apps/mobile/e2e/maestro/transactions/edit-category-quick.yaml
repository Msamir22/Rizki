appId: com.monyvi.app

---

# T033: Quick-edit category via tapping the category icon on a card
# Precondition: At least one transaction exists

# Step 1: Launch app and navigate to Transactions
- runFlow: ../helpers/setup.yaml

# Step 2: Wait for transaction list to load
- waitForAnimationToEnd

# Step 3: Tap the category icon on the first transaction card
- tapOn:
    id: "card-category-.*"
    index: 0

- waitForAnimationToEnd

# Step 4: Verify quick edit modal opens
- assertVisible: "Edit Category"

# Step 5: Tap a different category chip from the quick edit modal
- tapOn:
    id: "category-chip-.*"
    index: 1

# Step 6: Wait for modal to close and card to update
- waitForAnimationToEnd
- assertVisible: "Transactions"
